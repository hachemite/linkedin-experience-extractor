<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Native LinkedIn Font Stack & Colors */
      :root {
        --li-blue: #0a66c2;
        --li-blue-hover: #004182;
        --li-bg: #f3f2ef;
        --li-white: #ffffff;
        --li-border: #e0e0e0;
        --text-primary: rgba(0, 0, 0, 0.9);
        --text-secondary: rgba(0, 0, 0, 0.6);
        --text-tertiary: rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 400px;
        max-height: 600px;
        /* LinkedIn's exact font stack */
        font-family:
          -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          "Fira Sans", Ubuntu, Oxygen, "Oxygen Sans", Cantarell, "Droid Sans", "Apple Color Emoji",
          Helvetica, Arial, sans-serif;
        font-size: 14px;
        background: var(--li-bg);
        color: var(--text-primary);
        overflow: hidden; /* Hide main body scrollbar */
      }

      /* Header */
      .hdr {
        background: var(--li-blue);
        color: var(--li-white);
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hdr-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hdr h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      #last-saved {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.9;
      }

      /* Stats Grid */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--li-border);
        border-bottom: 1px solid var(--li-border);
      }
      .stat {
        background: var(--li-white);
        padding: 12px 4px;
        text-align: center;
      }
      .stat-n {
        font-size: 20px;
        font-weight: 600;
        color: var(--li-blue);
      }
      .stat-l {
        font-size: 10px;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin-top: 4px;
        font-weight: 600;
      }

      /* Actions */
      .actions {
        padding: 12px 16px;
        display: flex;
        gap: 8px;
        background: var(--li-white);
        border-bottom: 1px solid var(--li-border);
      }
      button {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid var(--text-tertiary);
        background: var(--li-white);
        color: var(--text-secondary);
        font-weight: 600;
        transition: all 0.2s;
      }
      button:hover {
        background: var(--li-bg);
        border-color: var(--text-secondary);
        color: var(--text-primary);
      }
      button.pri {
        background: var(--li-blue);
        color: var(--li-white);
        border-color: var(--li-blue);
        flex: 1;
        font-weight: 600;
      }
      button.pri:hover {
        background: var(--li-blue-hover);
        border-color: var(--li-blue-hover);
        color: var(--li-white);
      }
      button.danger {
        color: #cc1016;
        border-color: #fca3a8;
        background: #fce8e6;
      }
      button.danger:hover {
        background: #fad2cf;
        border-color: #cc1016;
      }

      /* Filter/Search */
      .filter-bar {
        padding: 12px 16px;
        background: var(--li-white);
        border-bottom: 1px solid var(--li-border);
      }
      .filter-bar input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--text-tertiary);
        border-radius: 4px;
        font-size: 14px;
        outline: none;
        transition: border 0.2s;
        font-family: inherit;
      }
      .filter-bar input:focus {
        border-color: var(--text-primary);
      }

      /* List & Clean Custom Scrollbar */
      .list {
        overflow-y: auto;
        height: 340px;
        background: var(--li-bg);
        padding: 12px 16px;
      }
      .list::-webkit-scrollbar {
        width: 8px;
      }
      .list::-webkit-scrollbar-track {
        background: transparent;
      }
      .list::-webkit-scrollbar-thumb {
        background: #c5c5c5;
        border-radius: 4px;
      }
      .list::-webkit-scrollbar-thumb:hover {
        background: #a0a0a0;
      }

      /* Cards (Matching the Screenshot perfectly) */
      .card {
        background: var(--li-white);
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 12px;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      }
      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .card-name {
        font-weight: 600;
        font-size: 15px;
        color: var(--text-primary);
        text-transform: uppercase;
      }
      .card-name a {
        color: inherit;
        text-decoration: none;
      }
      .card-name a:hover {
        color: var(--li-blue);
        text-decoration: underline;
      }

      .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 12px;
        background: #e8f3ff;
        color: var(--li-blue);
        font-weight: 600;
        border: 1px solid #d0e8ff;
      }
      .headline {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 12px;
        line-height: 1.4;
      }

      .section-head {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin: 16px 0 8px;
        letter-spacing: 0.5px;
      }

      .exp-item {
        margin-bottom: 16px;
        padding-left: 10px;
        border-left: 3px solid var(--li-blue);
      }
      .exp-item:last-child {
        margin-bottom: 0;
      }
      .exp-role {
        font-weight: 600;
        font-size: 14px;
        display: block;
        color: var(--text-primary);
      }
      .exp-co {
        color: var(--text-secondary);
        font-size: 13px;
        display: block;
        margin-top: 2px;
      }
      .exp-meta {
        color: var(--text-secondary);
        font-size: 13px;
        margin-top: 2px;
        display: block;
      }
      .exp-desc {
        font-size: 13px;
        color: var(--text-primary);
        margin-top: 6px;
        line-height: 1.5;
      }

      .empty {
        padding: 40px 20px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="hdr">
      <div class="hdr-left">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="6"></circle>
          <circle cx="12" cy="12" r="2"></circle>
        </svg>
        <h1>LINKEDIN ExTRACTOR</h1>
      </div>
      <span id="last-saved">Updated just now</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="s-all">0</div>
        <div class="stat-l">Profiles</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-exp">0</div>
        <div class="stat-l">Exp</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-proj">0</div>
        <div class="stat-l">Proj</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-cos">0</div>
        <div class="stat-l">Companies</div>
      </div>
    </div>

    <div class="actions">
      <button class="pri" id="btn-csv">Download CSV</button>
      <button id="btn-json">JSON</button>
      <button class="danger" id="btn-clear">Clear</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="search" placeholder="Search saved data..." />
    </div>

    <div class="list" id="list">
      <div class="empty">No profiles captured yet.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
