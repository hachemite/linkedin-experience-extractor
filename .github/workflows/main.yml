name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # This triggers the workflow ONLY when you push a tag like v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Zip the extension
      run: zip -r Linkedin-Experience-ExTRACTOR.zip . -x "*.git*" "*.github*" "node_modules/*" "README.md"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: Linkedin-Experience-ExTRACTOR.zip
        name: Release ${{ github.ref_name }}
        body: |
          ### New Update
          Automated build for version ${{ github.ref_name }}.
          
          **Changes in this release:**
          - Updated extractor logic
          - Bug fixes and performance improvements
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
