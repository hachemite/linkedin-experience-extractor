name: Build Extension ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Zip the extension
      run: zip -r Linkedin-ExTRACTOR.zip . -x "*.git*" "*.github*" "node_modules/*" "README.md"

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: linkedin-extractor-zip
        path: linkedin-extractor.zip
