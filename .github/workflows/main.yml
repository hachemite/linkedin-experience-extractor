name: Build and Release Extension

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Fixes the 403 error

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Zip the extension
      # Using lowercase to be safe
      run: zip -r Linkedin-Experience-ExTRACTOR.zip . -x "*.git*" "*.github*" "node_modules/*" "README.md"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        # Create a tag name based on the run number or a timestamp
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: Linkedin-Experience-ExTRACTOR.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
